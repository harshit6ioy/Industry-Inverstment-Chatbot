services:
  - type: web
    name: ai-investment-agent-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: OPENROUTER_API_KEY
        sync: false # Requires you to enter the API key in the Render Dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
